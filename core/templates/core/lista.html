<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Transações</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light py-5">

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h3">💼 Lista de Transações</h1>
        <a href="{% url 'nova_transacao' %}" class="btn btn-primary">＋ Nova Transação</a>
    </div>

    {% if transacoes %}
        <div class="table-responsive shadow-sm">
            <table class="table table-striped table-hover align-middle bg-white rounded">
                <thead class="table-light">
                    <tr>
                        <th>Data</th>
                        <th>Descrição</th>
                        <th class="text-end">Valor (€)</th>
                    </tr>
                </thead>
                <tbody>
                    {% for transacao in transacoes %}
                        <tr>
                            <td>{{ transacao.data|date:"d/m/Y" }}</td>
                            <td>{{ transacao.descricao }}</td>
                            <td class="text-end">
                                {{ transacao.valor|floatformat:2 }} €
                            </td>
                        </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    {% else %}
        <div class="alert alert-info text-center" role="alert">
            Nenhuma transação registada.
        </div>
    {% endif %}
</div>

</body>
</html>
