<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>Nova Transação</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light py-5">

<div class="container">
    <div class="card shadow-sm mx-auto" style="max-width: 500px;">
        <div class="card-body">
            <h2 class="card-title mb-4 text-center">Adicionar Transação</h2>

            <form method="post">
                {% csrf_token %}

                <div class="mb-3">
                    <label for="{{ form.descricao.id_for_label }}" class="form-label">Descrição</label>
                    {{ form.descricao }}
                </div>

                <div class="mb-3">
                    <label for="{{ form.valor.id_for_label }}" class="form-label">Valor</label>
                    {{ form.valor }}
                </div>

                <div class="mb-3">
                    <label for="{{ form.data.id_for_label }}" class="form-label">Data</label>
                    {{ form.data }}
                </div>

                <div class="d-grid">
                    <button type="submit" class="btn btn-success mt-3">💾 Guardar</button>
                </div>
            </form>

            <div class="text-center mt-4">
                <a href="{% url 'lista_transacoes' %}" class="btn btn-outline-secondary">← Voltar à lista</a>
            </div>
        </div>
    </div>
</div>

</body>
</html>
