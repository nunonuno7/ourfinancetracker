name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-sqlite:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    env:
      DJANGO_SETTINGS_MODULE: ourfinancetracker_site.settings_test
      SECRET_KEY: test-secret-key
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Show environment
        run: |
          python --version
          pip --version
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run system checks
        run: |
          python manage.py check --deploy
          python manage.py makemigrations --check
      - name: Run tests
        run: pytest

  test-postgres:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: ourfinancetracker_ci
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ourfinancetracker_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DJANGO_SETTINGS_MODULE: ourfinancetracker_site.settings_test
      SECRET_KEY: test-secret-key
      TEST_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/ourfinancetracker_ci
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Show environment
        run: |
          python --version
          pip --version
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run system checks
        run: |
          python manage.py check --deploy
          python manage.py makemigrations --check
      - name: Run tests
        run: pytest

  browser-smoke:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: ourfinancetracker_ci
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ourfinancetracker_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DJANGO_SETTINGS_MODULE: ourfinancetracker_site.settings_test
      SECRET_KEY: test-secret-key
      TEST_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/ourfinancetracker_ci
      RUN_BROWSER_SMOKE: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Show environment
        run: |
          python --version
          pip --version
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
      - name: Install Playwright browser
        run: python -m playwright install --with-deps chromium
      - name: Run browser smoke tests
        run: pytest -q core/tests/test_browser_smoke.py
